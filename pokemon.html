<!DOCTYPE html>
<html lang="en">
  <head>
    <title> Pokemon Team Builder</title>
    <link rel="stylesheet" href="pokemon.css">
  </head>
  <body>

    <div id="app">
      <div id="searchBar">
        <label for="pokemonInput">Name or ID</label>
        <input type="text" id="pokemon-input">
        <button id="find">Find</button>
      </div>

      <div id = "pokemonDisplay">
        <img id="pokemonImage">
        <audio id="pokemonAudio" controls></audio>
        
        <select id="move1"></select>
        <select id="move2"></select>
        <select id="move3"></select>
        <select id="move4"></select>

        <button id="addPokemon"> Add to Team</button>
      </div>

      <div id="team"></div>
    
    </div>
      <script src="script.js"></script>
  </body>
</html>
